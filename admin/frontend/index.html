<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка Правбюро</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://unpkg.com/vis-network@9/standalone/umd/vis-network.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen">

<header class="bg-white border-b">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-semibold">Админка Правбюро</h1>
    <div class="flex items-center gap-3">
      <span id="currentUsername" class="text-sm text-gray-400"></span>
      <nav class="hidden sm:flex items-center gap-2">
        <button data-tab="stats" class="tab-btn px-3 py-1.5 rounded-md text-sm font-medium">Статистика</button>
        <button data-tab="users" class="tab-btn px-3 py-1.5 rounded-md text-sm font-medium">Пользователи</button>
        <button data-tab="tags" class="tab-btn px-3 py-1.5 rounded-md text-sm font-medium">Теги</button>
        <button data-tab="broadcast" class="tab-btn px-3 py-1.5 rounded-md text-sm font-medium">Рассылки</button>
        <button data-tab="graph" class="tab-btn px-3 py-1.5 rounded-md text-sm font-medium">Граф сценария</button>
        <button data-tab="scenario" class="tab-btn px-3 py-1.5 rounded-md text-sm font-medium">Сценарий</button>
        <button id="logoutBtn" class="logout-btn text-sm text-red-600 px-2">Выйти</button>
      </nav>
      <button id="mobileMenuBtn" class="sm:hidden p-1.5 -mr-1.5 text-gray-700" aria-label="Меню" aria-expanded="false">
        <svg id="mobileMenuIconOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <svg id="mobileMenuIconClose" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
  <nav id="mobileMenu" class="hidden sm:hidden border-t">
    <div class="px-4 py-2 flex flex-col">
      <button data-tab="stats" class="tab-btn px-3 py-2.5 rounded-md text-sm font-medium text-left">Статистика</button>
      <button data-tab="users" class="tab-btn px-3 py-2.5 rounded-md text-sm font-medium text-left">Пользователи</button>
      <button data-tab="tags" class="tab-btn px-3 py-2.5 rounded-md text-sm font-medium text-left">Теги</button>
      <button data-tab="broadcast" class="tab-btn px-3 py-2.5 rounded-md text-sm font-medium text-left">Рассылки</button>
      <button data-tab="graph" class="tab-btn px-3 py-2.5 rounded-md text-sm font-medium text-left">Граф сценария</button>
      <button data-tab="scenario" class="tab-btn px-3 py-2.5 rounded-md text-sm font-medium text-left">Сценарий</button>
      <button id="mobileLogoutBtn" class="logout-btn text-sm text-red-600 px-3 py-2.5 text-left border-t mt-1 pt-3">Выйти</button>
    </div>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-3 sm:px-4 py-6">

  <section id="tab-stats" class="space-y-6">
    <div class="bg-white rounded-lg shadow-sm border p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold">Пользователи по source</h2>
        <div class="flex items-center gap-2 text-xs">
          <button id="sourcesSelectAll" class="text-blue-600 hover:underline">Выбрать все</button>
          <span class="text-gray-300">|</span>
          <button id="sourcesSelectNone" class="text-blue-600 hover:underline">Снять все</button>
        </div>
      </div>
      <div id="sourcesCheckboxes" class="flex flex-wrap gap-x-4 gap-y-1 mb-4 text-sm"></div>
      <canvas id="sourcesChart" height="90"></canvas>
    </div>

    <div class="bg-white rounded-lg shadow-sm border p-4">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-gray-500 border-b">
            <th class="py-2">Source</th>
            <th class="py-2">Кол-во пользователей</th>
          </tr>
        </thead>
        <tbody id="sourcesTableBody"></tbody>
      </table>
    </div>
  </section>

  <section id="tab-users" class="hidden space-y-4">
    <div class="bg-white rounded-lg shadow-sm border p-4 flex flex-wrap items-center gap-3">
      <label class="text-sm text-gray-600">Фильтр:</label>
      <select id="userSearchField" class="border rounded-md px-2 py-1 text-sm w-full sm:w-auto">
        <option value="name">Имя</option>
        <option value="username">Username</option>
        <option value="phone">Телефон</option>
        <option value="region">Регион</option>
        <option value="source">Source</option>
        <option value="user_id">ID</option>
      </select>
      <input id="userSearch" type="text" placeholder="Значение..." class="border rounded-md px-2 py-1 text-sm w-full sm:w-56">

      <label class="text-sm text-gray-600">Тег:</label>
      <select id="tagFilter" class="border rounded-md px-2 py-1 text-sm w-full sm:w-auto">
        <option value="">Все</option>
      </select>

    </div>

    <div class="responsive-table-wrap bg-white rounded-lg shadow-sm border overflow-x-auto">
      <table class="responsive-table w-full text-sm sm:whitespace-nowrap">
        <thead>
          <tr class="text-left text-gray-500 border-b">
            <th class="py-2 px-3">ID</th>
            <th class="py-2 px-3">Username</th>
            <th class="py-2 px-3">Имя</th>
            <th class="py-2 px-3">Телефон</th>
            <th class="py-2 px-3">Регион</th>
            <th class="py-2 px-3">Source</th>
            <th class="py-2 px-3">Этап</th>
            <th class="py-2 px-3">Тег</th>
            <th class="py-2 px-3">Создан</th>
          </tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>

    <div class="flex items-center justify-between text-sm text-gray-600">
      <span id="usersRangeLabel"></span>
      <div class="flex items-center gap-2">
        <button id="prevPageBtn" class="border rounded-md px-3 py-1 disabled:opacity-40">Назад</button>
        <span class="flex items-center gap-1">
          Страница
          <input id="pageInput" type="number" min="1" class="border rounded-md px-1.5 py-1 w-14 text-center">
          из <span id="pageTotalLabel"></span>
        </span>
        <button id="nextPageBtn" class="border rounded-md px-3 py-1 disabled:opacity-40">Вперёд</button>
      </div>
    </div>
  </section>

  <section id="tab-tags" class="hidden space-y-4">
    <div class="bg-white rounded-lg shadow-sm border p-4 flex items-center gap-2">
      <input id="newTagName" type="text" placeholder="Новый тег" maxlength="32" class="border rounded-md px-2 py-1 text-sm w-64">
      <button id="createTagBtn" class="bg-gray-900 text-white text-sm px-3 py-1.5 rounded-md">Создать</button>
    </div>

    <div class="responsive-table-wrap bg-white rounded-lg shadow-sm border overflow-x-auto">
      <table class="responsive-table w-full text-sm">
        <thead>
          <tr class="text-left text-gray-500 border-b">
            <th class="py-2 px-3">Название</th>
            <th class="py-2 px-3">Создан</th>
            <th class="py-2 px-3"></th>
          </tr>
        </thead>
        <tbody id="tagsTableBody"></tbody>
      </table>
    </div>
  </section>

  <section id="tab-broadcast" class="hidden space-y-4">
    <div class="bg-white rounded-lg shadow-sm border p-4 space-y-3 max-w-2xl">
      <div>
        <label class="text-sm text-gray-600 block mb-1">Кому:</label>
        <select id="broadcastTag" class="border rounded-md px-2 py-1 text-sm w-full">
          <option value="">Всем пользователям</option>
        </select>
      </div>

      <div>
        <label class="text-sm text-gray-600 block mb-1">Текст сообщения:</label>
        <textarea id="broadcastText" rows="6" class="border rounded-md px-2 py-1.5 text-sm w-full"
                  placeholder="Текст рассылки..."></textarea>
      </div>

      <button id="broadcastSendBtn" class="bg-gray-900 text-white text-sm px-4 py-2 rounded-md">Отправить рассылку</button>

      <div id="broadcastResult" class="text-sm"></div>
    </div>
  </section>

  <section id="tab-graph" class="hidden">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 items-start">
      <div class="bg-white rounded-lg shadow-sm border p-2 lg:col-span-2">
        <div id="scenarioGraphLegend" class="flex flex-wrap gap-3 text-xs text-gray-600 px-2 pt-2 pb-1"></div>
        <div id="scenarioGraph" class="w-full h-[70vh] rounded-md"></div>
      </div>

      <div class="bg-white rounded-lg shadow-sm border p-4 lg:col-span-1 lg:sticky lg:top-4 max-h-[75vh] overflow-y-auto overflow-x-hidden">
        <div id="graphDetailEmpty" class="text-sm text-gray-500">Нажмите на звено графа, чтобы посмотреть подробности.</div>
        <div id="graphDetailContent" class="hidden space-y-3 text-sm break-words min-w-0"></div>
      </div>
    </div>
  </section>

  <section id="tab-scenario" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
      <div class="bg-white rounded-lg shadow-sm border p-4 md:col-span-1">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold">Блоки сценария</h2>
          <button id="newBlockBtn" class="text-sm bg-gray-900 text-white px-2 py-1 rounded-md">+ Новый</button>
        </div>
        <input id="blockSearch" type="text" placeholder="Поиск по id..." class="border rounded-md px-2 py-1 text-sm w-full mb-2">
        <div id="blockList" class="space-y-1 max-h-[70vh] overflow-y-auto text-sm"></div>
      </div>

      <div class="bg-white rounded-lg shadow-sm border p-4 md:col-span-2">
        <div id="blockEditorEmpty" class="text-sm text-gray-500">Выберите блок слева или создайте новый.</div>
        <form id="blockEditorForm" class="hidden space-y-3">
          <div>
            <label class="text-sm text-gray-600 block mb-1">ID блока <span class="text-red-600">*</span></label>
            <input id="fieldBlockId" type="text" class="border rounded-md px-2 py-1 text-sm w-full">
          </div>
          <div>
            <label class="text-sm text-gray-600 block mb-1">JSON блока <span class="text-red-600">*</span></label>
            <textarea id="fieldBlockJson" rows="18" spellcheck="false"
                      class="border rounded-md px-2 py-1.5 text-sm w-full font-mono"></textarea>
          </div>

          <div id="scenarioMetaHint" class="text-xs text-gray-500 bg-gray-50 border rounded-md p-3 space-y-1"></div>

          <div class="flex gap-2 pt-2">
            <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded-md">Сохранить</button>
            <button type="button" id="cancelEditBtn" class="border text-sm px-4 py-2 rounded-md">Отмена</button>
          </div>
        </form>
      </div>
    </div>
  </section>

</main>

<div id="confirmModalOverlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-40 transition-opacity duration-200 opacity-0">
  <div id="confirmModalBox" class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full mx-4 transition-all duration-200 opacity-0 scale-95">
    <p id="confirmModalMessage" class="text-sm text-gray-800 whitespace-pre-line mb-5"></p>
    <div class="flex justify-end gap-2">
      <button id="confirmModalCancel" class="px-3 py-1.5 rounded-md text-sm border">Отмена</button>
      <button id="confirmModalConfirm" class="px-3 py-1.5 rounded-md text-sm bg-gray-900 text-white">Подтвердить</button>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
