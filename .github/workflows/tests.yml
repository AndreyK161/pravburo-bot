name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bot_pravburo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bot_pravburo
      BOT_TOKEN: test-token
      VK_TOKEN: test-token
      SESSION_SECRET_KEY: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tg_bot dependencies
        run: pip install -r tg_bot/requirements.txt

      - name: Install vk_bot dependencies
        run: pip install -r vk_bot/requirements.txt

      - name: Install admin backend dependencies (нужны для alembic)
        run: pip install -r admin_bot/backend/requirements.txt

      - name: Run migrations
        working-directory: admin_bot/backend
        run: alembic upgrade head

      - name: Run tg_bot tests
        working-directory: tg_bot
        run: pytest -q

      - name: Run vk_bot tests
        working-directory: vk_bot
        run: pytest -q

      - name: Build docker images (sanity check)
        run: |
          docker build -f tg_bot/Dockerfile -t pravburo-bot:ci .
          docker build -f vk_bot/Dockerfile -t pravburo-vk-bot:ci .
          docker build -f admin_bot/backend/Dockerfile -t pravburo-admin:ci .

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/botuser/pravburo-bot
            git pull
            docker compose build bot vk_bot admin
            docker compose run --rm admin alembic upgrade head
            docker compose up -d db bot vk_bot admin
