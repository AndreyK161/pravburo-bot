name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bot_pravburo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bot_pravburo
      BOT_TOKEN: test-token
      SESSION_SECRET_KEY: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bot dependencies
        run: pip install -r requirements.txt

      - name: Install admin backend dependencies (нужны для alembic)
        run: pip install -r admin/backend/requirements.txt

      - name: Run migrations
        working-directory: admin/backend
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/botuser/pravburo-bot
            git pull
            .venv/bin/pip install -r requirements.txt
            admin/backend/.venv/bin/pip install -r admin/backend/requirements.txt
            cd admin/backend
            .venv/bin/alembic upgrade head
            sudo systemctl restart pravburo-bot.service
            sudo systemctl restart pravburo-admin.service
